name: ${PROJECT_NAME:-compose-zero-downtime}

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${PUBLIC_PORT:-8080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  app_blue:
    image: ${BLUE_IMAGE:-nginx:1.27-alpine}
    profiles: ["blue"]
    expose:
      - "${APP_PORT:-80}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${APP_PORT:-80}/health || wget -qO- http://localhost:${APP_PORT:-80}/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  app_green:
    image: ${GREEN_IMAGE:-nginx:1.27-alpine}
    profiles: ["green"]
    expose:
      - "${APP_PORT:-80}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${APP_PORT:-80}/health || wget -qO- http://localhost:${APP_PORT:-80}/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped
